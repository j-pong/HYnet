# This configuration requires 4 gpus with 12GB memory
accum-grad: 4
adim: 512
aheads: 8
backend: pytorch
batch-bins: 36000000
dropout-rate: 0.1
elayers: 12
epochs: 120
eunits: 512
grad-clip: 5
lsm-weight: 0.0
model-module: moneynet.nets.pytorch_backend.e2e_asr_conformer:E2E
mtlalpha: 0.0
opt: noam
patience: 0
sortagrad: 0
transformer-encoder-pos-enc-layer-type: rel_pos
transformer-encoder-selfattn-layer-type: rel_selfattn
transformer-attn-dropout-rate: 0.0
transformer-init: pytorch
transformer-input-layer: conv2d
transformer-length-normalized-loss: false
transformer-lr: 5.0
transformer-warmup-steps: 25000
oversampling: 4
outer : 1
residual: 0
use-cnn-module: True
universal: True
