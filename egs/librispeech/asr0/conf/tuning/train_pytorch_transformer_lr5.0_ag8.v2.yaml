# transformer AM parameter tuning #2
# test_clean(WER) :  5.64% , training time : 18~20 hours
accum-grad: 4 #8
adim: 512 #256
aheads: 8 #4
backend: pytorch
batch-bins: 98000000 #5992000
#batch-count: bin
#dlayers: 6
dropout-rate: 0.1
dunits: 2048
elayers: 12
epochs: 120 #100
eunits: 2048
grad-clip: 5
lsm-weight: 0.1
model-module: moneynet.nets.pytorch_backend.e2e_asr_transformer:E2E
mtlalpha: 0.0 #0.3
opt: adam #noam
patience: 0
sortagrad: 0
transformer-attn-dropout-rate: 0.0
transformer-init: pytorch
transformer-input-layer: conv2d
transformer-length-normalized-loss: false
transformer-lr: 10.0 #5.0
transformer-warmup-steps: 8000 #25000

oversampling: 4
outer : 1
residual: 0
