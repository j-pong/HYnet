# This configuration requires 4 gpus with 12GB memory
accum-grad: 4
adim: 256
aheads: 4
backend: pytorch
batch-bins: 10000000
dropout-rate: 0.1
elayers: 6
epochs: 120
eunits: 512
grad-clip: 5
lsm-weight: 0.1
model-module: moneynet.nets.pytorch_backend.e2e_asr_sinc_transformer:E2E
mtlalpha: 0.0
opt: noam
patience: 0
sortagrad: 0
transformer-attn-dropout-rate: 0.0
transformer-init: pytorch
transformer-input-layer: conv2d
transformer-length-normalized-loss: false
transformer-lr: 10.0
transformer-warmup-steps: 25000
oversampling: 4
outer : 0
residual: 0

